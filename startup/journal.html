<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta 
            name="viewport" 
            content="width=device-width, initial-scale=1.0"/>
        <title>Home</title>
        <link rel="stylesheet" href="main.css" />
        <link rel="stylesheet" href="journal.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
            crossorigin="anonymous"/>
    </head>
    <body>
        <div id="top-banner">
            <img 
                src="images/floral_header.png" 
                class="img-fluid w-100"
                alt="Floral banner">
        </div>
        <div class="container">
            <header>
                <div id="title-block" class="text-center py-1">
                    <h1 class="display-3">
                        Ripple Effect
                    </h1>
                    <p class="lead">
                        Small acts. Big Ripples.
                    </p>
                </div>

                <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
                    <ul class="navbar-nav flex-row flex-wrap mx-auto">
                        <li class="nav-item px-4">
                            <a class="nav-link" href="index.html">Login</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link" href="home.html">Home</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link" href="community.html">Community</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link active" href="journal.html">My Journal</a>
                        </li>
                    </ul>
                </nav>
            </header>

            <main>
                <section id="create-entry">
                    <h3>Create a Journal Entry</h3>
                    <form method="post" action="journal.html">
                        <div>
                            <label for="entry-date">Date: </label>
                            <input type="date" id="entry-date" name="entry-date">
                            <label for="entry-time">Time: </label>
                            <input type="time" name="entry-time" id="entry-time">
                        </div>
                        <div>
                            <label for="entry-desc">Description: </label>
                            <br />
                            <textarea name="entry-desc" id="entry-desc" placeholder="How did it go?"></textarea>
                        </div>

                        <button type="submit">Record Entry</button>
                        <button type="reset">Clear</button>
                    </form>
                </section>
                <hr />

                <section id="entries-display">
                    <!-- DB Placeholder -->
                    <!-- Will recall journal entries from DB -->
                    <h3>A Record of my Accomplishments</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Nov. 8th, 2022</td>
                                <td>3:55 PM</td>
                                <td>Helped elderly heighbor mow lawn</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </main>

            <footer>
            <hr />
                <span>Matthew Wellman</span>
                <br />
                <a href="https://github.com/Mdubs2406">(GitHub)</a>
            </footer>
        </div>
    </body>
</html>
