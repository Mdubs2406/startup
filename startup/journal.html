<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta 
            name="viewport" 
            content="width=device-width, initial-scale=1.0"/>
        <title>My Journal</title>
        <link rel="stylesheet" href="main.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
            crossorigin="anonymous"/>
    </head>
    <body>
        <div id="top-banner">
            <img 
                src="images/floral_header.png" 
                class="img-fluid w-100"
                alt="Floral banner">
        </div>
        <div class="container">
            <header>
                <div id="title-block" class="text-center py-1">
                    <h1 class="display-3">
                        Ripple Effect
                    </h1>
                    <p class="lead">Small acts. Big Ripples.</p>
                </div>

                <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
                    <ul class="navbar-nav flex-row flex-wrap mx-auto">
                        <li class="nav-item px-4">
                            <a class="nav-link" href="index.html">Login</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link" href="home.html">Home</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link" href="community.html">Community</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link active" href="journal.html">My Journal</a>
                        </li>
                    </ul>
                </nav>
            </header>

            <main class="py-3">
                <section id="create-entry" class="card shadow-sm mb-3">
                    <h3 class="card-header">Create a Journal Entry</h3>
                    <div class="card-body">
                        <form method="post" action="journal.html">
                            <div class="input-group mb-2">
                                <span class="input-group-text">Date</span>
                                <input 
                                    type="date" 
                                    id="entry-date" 
                                    name="entry-date"
                                    class="form-control"
                                    required>
                                <span class="input-group-text">Time</span>
                                <input 
                                    type="time" 
                                    name="entry-time" 
                                    id="entry-time"
                                    class="form-control"
                                    required>
                            </div>
                            <div class="mb-2">
                                <textarea 
                                    name="entry-desc" 
                                    id="entry-desc" 
                                    placeholder="How did it go?"
                                    rows="5"
                                    class="form-control"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Record Entry</button>
                            <button type="reset" class="btn btn-secondary">Clear</button>
                        </form>
                    </div>
                </section>

                <section id="entries-display" class="card">
                    <!-- DB Placeholder -->
                    <!-- Will recall journal entries from DB -->
                    <h3 class="card-header">A Record of my Accomplishments</h3>
                    <table class="card-body table table-striped-columns">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Nov. 8th, 2022</td>
                                <td>3:55 PM</td>
                                <td>Helped elderly heighbor mow lawn</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </main>

            <footer class="text-center text-muted py-2 border-top mt-2">
                <span>Matthew Wellman</span>
                <a class="nav-link" href="https://github.com/Mdubs2406">[GitHub]</a>
            </footer>
        </div>
    </body>
</html>
