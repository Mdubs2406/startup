<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta 
            name="viewport" 
            content="width=device-width, initial-scale=1.0"/>
        <title>Community</title>
        <link rel="stylesheet" href="main.css" />
        <link rel="stylesheet" href="journal.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
            crossorigin="anonymous"/>
    </head>
    <body>
        <div id="top-banner">
            <img 
                src="images/floral_header.png" 
                class="img-fluid w-100"
                alt="Floral banner">
        </div>
        <div class="container">
            <header>
                <div id="title-block" class="text-center py-1">
                    <h1 class="display-3">
                        Ripple Effect
                    </h1>
                    <p class="lead">Small acts. Big Ripples.</p>
                </div>

                <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
                    <ul class="navbar-nav flex-row flex-wrap mx-auto">
                        <li class="nav-item px-4">
                            <a class="nav-link" href="index.html">Login</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link" href="home.html">Home</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link active" href="community.html">Community</a>
                        </li>
                        <li class="nav-item px-4">
                            <a class="nav-link" href="journal.html">My Journal</a>
                        </li>
                    </ul>
                </nav>
            </header>

            <main class="py-3">
                <section id="create-post" class="card">
                    <h3 class="card-header">Post about a Service Opportunity</h3>
                    <form method="post" action="community.html">
                        <div>
                            <label for="event-name">Event Name: </label>
                            <input type="text" id="event-name" name="event-name">
                        </div>
                        <div>
                            <label for="event-location">Location: </label>
                            <input type="text" id="event-location" name="event-location">
                        </div>
                        <div>
                            <label for="event-date">Date: </label>
                            <input type="date" id="event-date" name="event-date">
                            <label for="event-time">Time: </label>
                            <input type="time" id="event-time" name="event-time">
                        </div>
                        <div>
                            <label for="event-desc">Event Description: </label>
                            <br />
                            <textarea name="event-description" id="event-desc"></textarea>
                        </div>

                        <button type="submit">Post</button>
                        <button type="reset">Clear</button>
                    </form>
                </section>
                <hr />

                <section id="posts-display">
                    <!-- DB Placeholder -->
                    <!-- Will recall community posts stored in the database -->
                    <h3>Service Opportunities in your Community</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Date</th>
                                <th>Time</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Park Clean Up</td>
                                <td>Help clean up City Park!</td>
                                <td>Aug 14th, 2026</td>
                                <td>10:00 AM</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </main>

            <footer>
            <hr />
                <span>Matthew Wellman</span>
                <br />
                <a href="https://github.com/Mdubs2406">(GitHub)</a>
            </footer>
        </div>
    </body>
</html>
