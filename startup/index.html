<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta 
            name="viewport" 
            content="width=device-width, initial-scale=1.0"/>
        <title>Login</title>
        <link rel="stylesheet" href="main.css" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
            crossorigin="anonymous"/>
    </head>
    <body>
        <div id="top-banner" class="banner">
            <img 
                src="images/floral_header.png" 
                class="img.fluid w-100"
                alt="Floral banner">
        </div>
        <div class="container">
            <header>
                <div id="title-block" class="text-center py-1">
                    <h1 class="display-3">
                        Ripple Effect
                    </h1>
                    <p class="lead">
                        Small acts. Big Ripples.
                    </p>
                </div>

                <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
                    <ul class="navbar-nav flex-row mx-auto">
                        <li class="nav-item mx-4">
                            <a class="nav-link active" href="index.html">Login</a>
                        </li>
                        <li class="nav-item mx-4">
                            <a class="nav-link" href="home.html">Home</a>
                        </li>
                        <li class="nav-item mx-4">
                            <a class="nav-link" href="community.html">Community</a>
                        </li>
                        <li class="nav-item mx-4">
                            <a class="nav-link" href="journal.html">My Journal</a>
                        </li>
                    </ul>
                </nav>
            </header>

            <main class="py-2">
                <h1 class="display-5 text-center">
                    Welcome Back
                </h1>
                <p class="lead text-center">
                    Sign in to continue spreading good.
                </p>

                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <form method="post" action="home.html">
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    Email: 
                                </label>
                                <input 
                                    type="email" 
                                    id="email" 
                                    name="email" 
                                    placeholder="email@example.com"
                                    required
                                    class="form-control" />
                            </div>
                            <div class="mb-3">
                                <label for="password">
                                    Password: 
                                </label>
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password" 
                                    placeholder="********"
                                    required
                                    class="form-control"/>
                            </div>

                            <div class="d-flex gap-2">
                                <button 
                                    value="login" 
                                    name="submit" 
                                    type="submit" 
                                    class="btn btn-primary">
                                    Submit
                                </button>
                                <button 
                                    value="create" 
                                    name="create" 
                                    type="submit" 
                                    class="btn btn-secondary">
                                    Create Account
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- API placeholder -->
                <!-- Random Inspirational Quote -->
                <div id="inspiration-quote" class="card text-center mt-5">
                    <div class="card-body">
                        <h4 class="card-title">
                            You don't have to great to start, but you have to start to be great.
                        </h4>
                        <p class="card-text">
                            - Zig Ziglar
                        </p>
                    </div>
                </div>
            </main>

            <footer>
                <hr />
                <span>Matthew Wellman</span>
                <br />
                <a href="https://github.com/Mdubs2406">(GitHub)</a>
            </footer>
        </div>
    </body>
</html>
