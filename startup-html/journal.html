        <main>
            <section id="create_entry">
                <h3>Create a Journal Entry</h3>
                <form action="journal.html" method="get">
                    <div>
                        <label for="entry_data">Date: </label>
                        <input type="date" id="entry_date" name="entry_date">
                        <label for="entry_time">Time: </label>
                        <input type="time" name="entry_time" id="entry_time">
                    </div>
                    <div>
                        <label for="entry_desc">Description: </label>
                        <br />
                        <textarea name="entry_desc" id="entry_desc" placeholder="How did it go?"></textarea>
                    </div>

                    <button type="submit">Record Entry</button>
                    <button type="reset">Clear</button>
                </form>
            </section>
        </main>
