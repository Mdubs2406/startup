<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- meta placeholder -->
         <title>My Journal</title>
    </head>
    <body>
        <header>
            <h3>Good Deeds</h3>
            <h1>Ripple</h1>
            <hr />
            
            <nav>
                <menu>
                    <li><a href="index.html">Login</a></li>

                    <li><a href="community.html">Community</a></li>
                    <li><a href="journal.html">My Journal</a></li>
                </menu>
            </nav>
            <hr />
        </header>

        <main>
            <section id="create_entry">
                <h3>Create a Journal Entry</h3>
                <form action="journal.html" method="get">
                    <div>
                        <label for="entry_data">Date: </label>
                        <input type="date" id="entry_date" name="entry_date">
                        <label for="entry_time">Time: </label>
                        <input type="time" name="entry_time" id="entry_time">
                    </div>
                    <div>
                        <label for="entry_desc">Description: </label>
                        <br />
                        <textarea name="entry_desc" id="entry_desc" placeholder="How did it go?"></textarea>
                    </div>

                    <button type="submit">Record Entry</button>
                    <button type="reset">Clear</button>
                </form>
            </section>
            <hr />

            <section id="entries_display">
                <!-- DB Placeholder -->
                 <!-- Will recall journal entries from DB -->
                <h3>A Record of my Accomplishments</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Nov. 8th, 2022</td>
                            <td>3:55 PM</td>
                            <td>Helped elderly heighbor mow lawn</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
        <hr />
