<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
         <title>My Journal</title>
    </head>
    <body>
        <header>
            <div id="top-banner" class="banner"><img src="images/floral_header.png" alt="Floral banner"></div>
            <h1>Ripple Effect</h1>
            <hr />

            <nav>
                <menu>
                    <li><a href="index.html">Login</a></li>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="community.html">Community</a></li>
                    <li><a href="journal.html">My Journal</a></li>
                </menu>
            </nav>
            <hr />

            <div>
                User:
                <span class="user-name">John Doe</span>
            </div>
            <hr />
        </header>

        <main>
            <section id="create-entry">
                <h3>Create a Journal Entry</h3>
                <form method="post" action="journal.html">
                    <div>
                        <label for="entry-date">Date: </label>
                        <input type="date" id="entry-date" name="entry-date">
                        <label for="entry-time">Time: </label>
                        <input type="time" name="entry-time" id="entry-time">
                    </div>
                    <div>
                        <label for="entry-desc">Description: </label>
                        <br />
                        <textarea name="entry-desc" id="entry-desc" placeholder="How did it go?"></textarea>
                    </div>

                    <button type="submit">Record Entry</button>
                    <button type="reset">Clear</button>
                </form>
            </section>
            <hr />

            <section id="entries-display">
                <!-- DB Placeholder -->
                 <!-- Will recall journal entries from DB -->
                <h3>A Record of my Accomplishments</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Nov. 8th, 2022</td>
                            <td>3:55 PM</td>
                            <td>Helped elderly heighbor mow lawn</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>

        <footer>
        <hr />
            <span>Matthew Wellman</span>
            <br />
            <a href="https://github.com/Mdubs2406">(GitHub)</a>
        </footer>
    </body>
</html>
